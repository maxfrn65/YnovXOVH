apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-remediation-service
  namespace: ai-remediation
  labels:
    app: ai-remediation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-remediation-service
  template:
    metadata:
      labels:
        app: ai-remediation-service
    spec:
      containers:
        - name: placeholder
          image: busybox:1.36
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: "16Mi"
              cpu: "100m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
