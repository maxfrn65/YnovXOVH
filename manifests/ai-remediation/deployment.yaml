# PLACEHOLDER - a remplacer par Maxime/Aurelien.
# Le vrai service doit :
#   1. Lire les VulnerabilityReport (trivy-operator) / PolicyReport (Kyverno)
#      / alertes Falco.
#   2. Appeler AI Endpoints OVHcloud (secret OVH_AI_ENDPOINTS_ACCESS_TOKEN)
#      pour analyser et generer un correctif (patch de manifest).
#   3. Ouvrir une Pull Request sur github.com/maxfrn65/YnovXOVH avec un
#      token GitHub (secret a stocker via kubectl create secret, ne jamais
#      committer la valeur en clair).
# Une fois la PR mergee sur main, Argo CD (voir argocd/apps/) resynchronise
# automatiquement le workload corrige.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-remediation-service
  namespace: ai-remediation
  labels:
    app: ai-remediation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-remediation-service
  template:
    metadata:
      labels:
        app: ai-remediation-service
    spec:
      containers:
        - name: placeholder
          image: busybox:1.36
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
