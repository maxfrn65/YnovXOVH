apiVersion: apps/v1
kind: Deployment
metadata:
  name: insecure-config-app
  namespace: vulnerable-demo
  labels:
    app: insecure-config-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insecure-config-app
  template:
    metadata:
      labels:
        app: insecure-config-app
    spec:
      hostNetwork: false
      containers:
        - name: redis
          image: <securized_redis_image>
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: <secret_name>
                  key: REDIS_PASSWORD
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 30001
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
              add: null
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 6379
