apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trivy-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://aquasecurity.github.io/helm-charts/'
    targetRevision: HEAD
    chart: trivy-operator
    helm:
      values: |
        trivy:
          ignoreUnfixed: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: trivy-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
