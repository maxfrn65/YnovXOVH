# Propriétaire : Alexis (Cyber) - détection de menaces runtime (CNCF Graduated)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: hackathon-equipe9
  source:
    repoURL: "https://falcosecurity.github.io/charts"
    chart: falco
    # 9.1.0 = version déjà installée sur le cluster (4.7.3 n'existe plus
    # dans le dépôt Helm falcosecurity).
    targetRevision: 9.1.0
    helm:
      releaseName: falco
      values: |
        driver:
          kind: modern_ebpf
        tty: true
        # Sidekick + UI activés : alignés sur l'installation existante et sur
        # le guide (étape 7). TODO (Alexis) : brancher le webhook sidekick sur
        # le service IA pour exploiter les alertes runtime dans la boucle.
        falcosidekick:
          enabled: true
          webui:
            enabled: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
