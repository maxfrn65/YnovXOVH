# Propriétaire : Alexis (Cyber) - policy-as-code (CNCF Graduated)
# À compléter : ajouter les ClusterPolicy dans manifests/policies/ et les
# référencer ici (source secondaire) ou via une Application dédiée.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
spec:
  project: hackathon-equipe9
  source:
    repoURL: "https://kyverno.github.io/kyverno/"
    chart: kyverno
    targetRevision: 3.2.6
    helm:
      releaseName: kyverno
      values: |
        # TODO (Alexis) : ajuster selon les besoins (admission controller HA, etc.)
        replicaCount: 1
        # Métriques (Alexandre) : expose kyverno_policy_results_total vers
        # Prometheus (violations de policies sur le dashboard Grafana).
        admissionController:
          serviceMonitor:
            enabled: true
        reportsController:
          serviceMonitor:
            enabled: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # CRD volumineuses de Kyverno : requis pour éviter "annotation too long"
      # (cf. guide, étape 6.2 et dépannage).
      - ServerSideApply=true
