# Propriétaire : Alexandre (Observabilité) - métriques (CNCF Graduated).
# Inclut Prometheus + Grafana + Alertmanager. À ajuster (dashboards,
# ressources) selon la taille du cluster hackathon.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: hackathon-equipe9
  source:
    repoURL: "https://prometheus-community.github.io/helm-charts"
    chart: kube-prometheus-stack
    targetRevision: 62.7.0
    helm:
      releaseName: monitoring
      values: |
        grafana:
          enabled: true
          # Mot de passe de démo (cf. guide étape 7.2) - cluster jetable de
          # hackathon, pas de donnée sensible derrière.
          adminPassword: "hackathon2026"
          # Le sidecar charge automatiquement tout ConfigMap portant le label
          # grafana_dashboard=1 (cf. manifests/monitoring/) : les dashboards
          # vivent dans Git, pas dans l'UI.
          sidecar:
            dashboards:
              enabled: true
              searchNamespace: ALL
              label: grafana_dashboard
        prometheus:
          prometheusSpec:
            # Sans ces flags, Prometheus n'observe que les ServiceMonitors
            # créés par ce chart : indispensables pour scraper trivy-operator,
            # kyverno et le service ai-remediation.
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            retention: 48h
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # CRD volumineuses du Prometheus Operator : sans server-side apply,
      # Argo CD échoue avec "annotation too long" (cf. guide, dépannage).
      - ServerSideApply=true
